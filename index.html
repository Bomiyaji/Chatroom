<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Private Romantic Chat 💗</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff3f8e">
<link rel="apple-touch-icon" href="icons/icon-192.png">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="join" class="center">
  <h1 class="logo">💗 Private Space</h1>
  <input id="username" placeholder="Your name...">
  <input id="password" type="password" placeholder="Enter secret password">
  <button onclick="joinChat()">Enter Chat ✨</button>
</div>

<div id="chat" class="hidden">
  <div class="header">
    💌 Our Private Space
    <div id="status">💗 Online</div>
  </div>

  <div class="moodBox">
    <select id="mood" onchange="updateMood()">
      <option value="">Set Mood 💗</option>
      <option>😊 Happy</option>
      <option>😌 Calm</option>
      <option>❤️ Loving</option>
      <option>😴 Sleepy</option>
      <option>😔 Sad</option>
      <option>🔥 Excited</option>
    </select>
    <div id="liveMood"></div>
  </div>

  <div id="messages"></div>

  <div class="inputArea">
    <input id="msgInput" placeholder="Type something sweet..." onkeypress="if(event.key==='Enter') sendMessage()">
    <button onclick="sendMessage()">➤</button>
  </div>
</div>

<script type="module" src="app.js"></script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
