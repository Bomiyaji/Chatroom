<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Private Chat 💗</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- JOIN SCREEN -->
<div id="join" class="center">
  <h1 class="logo">💗 Private Space</h1>
  <input id="username" placeholder="Your beautiful name...">
  <button onclick="joinChat()">Enter Chat ✨</button>
</div>

<!-- CHAT -->
<div id="chat" class="hidden">

  <div class="header">
    💌 Live Chat
  </div>

  <div id="messages"></div>

  <div class="inputArea">
    <input id="msgInput" placeholder="Type something sweet..."
    onkeypress="if(event.key==='Enter') sendMessage()">
    <button onclick="sendMessage()">➤</button>
  </div>

</div>

<script type="module" src="app.js"></script>
</body>
</html>
