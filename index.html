<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Private Study Space 📚</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- JOIN SCREEN -->
<div id="join" class="center">
  <h1 class="logo">📚 Private Study Space</h1>
  <input id="username" placeholder="Your name...">
  <input id="password" type="password" placeholder="Enter secret password">
  <button onclick="joinChat()">Enter</button>
</div>

<!-- MAIN APP SCREEN -->
<div id="app" class="hidden">

  <!-- Header -->
  <div class="header">
    📖 Study Companion
    <div id="status">💡 Online</div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tabBtn" onclick="showTab('chat')">Chat</button>
    <button class="tabBtn" onclick="showTab('notes')">Notes</button>
    <button class="tabBtn" onclick="showTab('flashcards')">Flashcards</button>
  </div>

  <!-- Chat Tab -->
  <div id="chat" class="tabContent">
    <div class="inputArea">
      <input id="msgInput" placeholder="Type your message..." onkeypress="if(event.key==='Enter') sendMessage()">
      <button onclick="sendMessage()">➤</button>
    </div>
    <div id="messages"></div>
  </div>

  <!-- Notes Tab -->
  <div id="notes" class="tabContent hidden">
    <div id="notesList">
      <!-- Notes loaded from Firebase -->
    </div>
  </div>

  <!-- Flashcards Tab -->
  <div id="flashcards" class="tabContent hidden">
    <div id="flashcardDisplay">
      <p id="flashQuestion">Click 'Next' for a study tip!</p>
      <button onclick="nextFlashcard()">Next</button>
    </div>
  </div>

</div>

<audio id="msgSound">
  <source src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg">
</audio>

<script type="module" src="app.js"></script>
</body>
</html>
